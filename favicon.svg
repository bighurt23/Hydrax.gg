<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#8b6cff"/>
      <stop offset=".42" stop-color="#ff2e97"/>
      <stop offset=".72" stop-color="#ff79c6"/>
      <stop offset="1"   stop-color="#43d6e0"/>
    </linearGradient>
    <filter id="g" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- HydraX mark: single angular hydra head (from the Operator console art), transparent bg -->
  <g filter="url(#g)" transform="translate(50,50) scale(1.1) translate(0,33)">
    <!-- swept horns -->
    <path d="M11,-33 L37,-56 L18,-28 Z" fill="url(#hg)"/>
    <path d="M-11,-33 L-37,-56 L-18,-28 Z" fill="url(#hg)"/>
    <!-- crest spike -->
    <path d="M0,-62 L5,-49 L-5,-49 Z" fill="url(#hg)"/>
    <!-- angular skull -->
    <path d="M0,-60 L13,-46 L19,-29 L12,-12 L0,-4 L-12,-12 L-19,-29 L-13,-46 Z"
          fill="url(#hg)" stroke="#07060d" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- open maw -->
    <path d="M0,-4 L9,-15 L0,-21 L-9,-15 Z" fill="#07060d"/>
    <!-- teeth -->
    <path d="M-7,-15 L-5,-8 L-3,-15 Z M3,-15 L5,-8 L7,-15 Z" fill="#f0e9f6"/>
    <!-- sharp glowing pink eyes -->
    <path d="M-9,-36 L-3,-39 L-4,-30 Z" fill="#ff2e97"/>
    <path d="M9,-36 L3,-39 L4,-30 Z" fill="#ff2e97"/>
    <!-- brow ridges -->
    <path d="M-11,-41 L-3,-40 M11,-41 L3,-40" stroke="#ff79c6" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
