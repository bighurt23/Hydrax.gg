name: Refresh mining data

on:
  schedule:
    - cron: "*/30 * * * *"   # every ~30 min (GitHub may delay/queue scheduled runs)
  workflow_dispatch: {}        # adds a manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build coins.json + prices.json (WhatToMine + CoinGecko)
        run: python gen_data.py
      - name: Commit if changed
        run: |
          git config user.name  "hydrax-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/coins.json data/prices.json
          if git diff --staged --quiet; then
            echo "No data change."
          else
            git commit -m "chore: refresh mining data [skip ci]"
            git push
          fi
